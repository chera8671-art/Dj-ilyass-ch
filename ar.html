<!DOCTYPE html>
<html>
<head>

    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js/aframe/build/aframe-ar.js"></script>
</head>
<body>
    <a-scene embedded arjs>
        <!-- علامة AR تظهر فوقها نموذج ثلاثي الأبعاد -->

        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
