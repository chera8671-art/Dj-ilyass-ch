<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيتو الوليد – القنبلة النووية | Beto Nuclear Bomb</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- الخطوط العربية المستقبلية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    
    <!-- المكتبات الخارجية (Three.js, AI, Web3, Torrent, A-Frame) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@1.9.0/webtorrent.min.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js/aframe/build/aframe-ar.js"></script>

    <!-- الأنماط الأسطورية الداخلية -->
    <style>
        /* ============= إعدادات الكون ============= */
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-gold: #ffd700;
            --deep-space: #020014;
            --portal-purple: #6a0dad;
            --hologram-bg: rgba(10, 10, 30, 0.7);
            --glass-border: rgba(0, 255, 255, 0.4);
            --arabesque: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M20,50 Q50,20 80,50 T20,50" stroke="%2300ffff" fill="none" opacity="0.2"/></svg>');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Almarai', sans-serif;
            background: var(--deep-space);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            perspective: 1200px;
            -webkit-font-smoothing: antialiased;
        }

        /* خلفية المجرة الديناميكية (Three.js ستتحكم بها) */
        #bg-nuclear {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
        }

        /* تأثير ضبابي شفاف إضافي للعمق */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(2,0,20,0.9) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* ============= شريط الملاحة الكوني ============= */
        #nuclear-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px);
            padding: 15px 30px;
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta), var(--neon-gold)) 1;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 0 30px rgba(0,255,255,0.3);
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(45deg, var(--neon-gold), var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            filter: drop-shadow(0 0 10px var(--neon-cyan));
            animation: logoGlow 2s infinite alternate;
        }

        @keyframes logoGlow {
            from { filter: drop-shadow(0 0 10px var(--neon-cyan)); }
            to { filter: drop-shadow(0 0 25px var(--neon-magenta)); }
        }

        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .nav-buttons button {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .nav-buttons button:hover {
            background: rgba(0,255,255,0.15);
            box-shadow: 0 0 25px var(--neon-cyan), inset 0 0 10px var(--neon-cyan);
            border-color: var(--neon-magenta);
            color: var(--neon-gold);
        }

        /* ============= الألواح (الأكوان المتعددة) ============= */
        .panel {
            display: none;
            padding: 25px;
            margin: 20px auto;
            max-width: 1300px;
            background: var(--hologram-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 2px solid transparent;
            border-image: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta)) 1;
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.2), inset 0 0 30px rgba(255, 0, 255, 0.1);
            animation: panelAppear 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .panel.active {
            display: block;
        }

        @keyframes panelAppear {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .panel h2 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 25px;
            color: var(--neon-gold);
            text-shadow: 0 0 20px var(--neon-gold), 0 0 40px var(--neon-magenta);
            letter-spacing: 2px;
        }

        /* ============= أسلوب أزرار DJ وكل الأزرار العامة ============= */
        button {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px 20px;
            margin: 8px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            border-color: var(--neon-magenta);
            color: var(--neon-gold);
            box-shadow: 0 0 30px var(--neon-magenta);
        }

        /* ============= المداخل (input range) الثورية ============= */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            border-radius: 10px;
            outline: none;
            margin: 12px 0;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--neon-gold);
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 20px var(--neon-gold);
            cursor: pointer;
        }

        /* ============= لوحة DJ ============= */
        .dj-decks {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .deck {
            background: rgba(20, 20, 40, 0.8);
            border: 1px solid rgba(0,255,255,0.5);
            border-radius: 25px;
            padding: 20px;
            width: 340px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.15);
            transition: transform 0.3s;
        }

        .deck:hover {
            transform: translateY(-5px);
        }

        .master {
            background: rgba(30, 0, 30, 0.6);
            border: 1px solid var(--neon-magenta);
            border-radius: 25px;
            padding: 20px;
            width: 320px;
            text-align: center;
        }

        .viz {
            width: 100%;
            height: 100px;
            background: #000;
            border-radius: 15px;
            margin: 12px 0;
            border: 1px solid var(--neon-cyan);
        }

        /* تأثيرات مكتوبة بالعربية */
        .fx label {
            display: block;
            margin-top: 8px;
            font-size: 12px;
            color: var(--neon-cyan);
        }

        /* ============= لوحة الشات ============= */
        #chat-box {
            height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--neon-cyan);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 15px;
            font-size: 14px;
        }

        #chat-input {
            width: 70%;
            padding: 10px;
            background: #111;
            border: 1px solid var(--neon-magenta);
            border-radius: 8px;
            color: white;
        }

        /* ============= تأثيرات الانتقال بين الألواح ============= */
        .portal-transition {
            animation: portalOpen 0.5s ease-out;
        }

        @keyframes portalOpen {
            0% { clip-path: circle(0% at 50% 50%); }
            100% { clip-path: circle(100% at 50% 50%); }
        }

        /* ============= الخطوط العربية المخصصة ============= */
        h1, h2, h3, .logo, .nav-buttons button {
            font-family: 'Cairo', 'Almarai', sans-serif;
        }

        /* زخرفة عربية خلفية */
        .panel::after {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><path d="M50,100 Q100,20 150,100 T50,100" stroke="%2300ffff" fill="none" opacity="0.1" stroke-width="2"/></svg>') repeat;
            pointer-events: none;
            border-radius: 35px;
        }
    </style>
</head>
<body>
    <!-- خلفية المجرة -->
    <canvas id="bg-nuclear"></canvas>

    <!-- شريط المهام الكوني -->
    <nav id="nuclear-nav">
        <span class="logo">☢️ بيتو النووي</span>
        <div class="nav-buttons">
            <button onclick="switchPanel('dj')">🎧 الخلاط</button>
            <button onclick="switchPanel('live')">📡 البث</button>
            <button onclick="switchPanel('ai')">🧠 الذكاء</button>
            <button onclick="switchPanel('blockchain')">⛓️ Web3</button>
            <button onclick="switchPanel('social')">💬 الجماعة</button>
            <button onclick="switchPanel('games')">🎮 التحكم</button>
            <button onclick="switchPanel('files')">📁 تورنت</button>
            <button onclick="switchPanel('vr')">🥽 الواقع</button>
            <button onclick="switchPanel('midi')">🎹 MIDI</button>
            <button onclick="switchPanel('storage')">💾 الأرشفة</button>
        </div>
        <div id="user-count">👥 1</div>
    </nav>

    <!-- الحاوية الكونية -->
    <div id="main-container">
        <!-- لوحة DJ -->
        <div id="panel-dj" class="panel active">
            <h2>🎛️ الخلاط الأسطوري</h2>
            <div class="dj-decks">
                <div class="deck">
                    <h3>القرص أ</h3>
                    <input type="file" accept="audio/*" id="file-a" onchange="loadTrack(event,'a')">
                    <canvas id="viz-a" class="viz"></canvas>
                    <button onclick="togglePlay('a')">▶ تشغيل</button>
                    <input type="range" min="0" max="100" value="80" oninput="changeVolume('a',this.value/100)">
                    <div class="fx">
                        <label>الجهير</label><input type="range" min="-20" max="20" value="0" oninput="changeEQ('a','bass',this.value)">
                        <label>الوسط</label><input type="range" min="-20" max="20" value="0" oninput="changeEQ('a','mid',this.value)">
                        <label>الحاد</label><input type="range" min="-20" max="20" value="0" oninput="changeEQ('a','treble',this.value)">
                        <label>الصدى</label><input type="range" min="0" max="1" step="0.01" value="0" oninput="changeDelay('a',this.value)">
                        <label>التشويه</label><input type="range" min="0" max="100" value="0" oninput="changeDistortion('a',this.value)">
                        <button onclick="toggleReverb('a')">الصدى الثلاثي</button>
                        <button onclick="toggleFlanger('a')">الفلانجر</button>
                    </div>
                </div>
                <div class="master">
                    <h3>🎚️ الخلاط المركزي</h3>
                    <input type="range" id="crossfader" min="0" max="100" value="50" oninput="crossfade(this.value/100)">
                    <button onclick="syncDecks()">مزامنة</button>
                    <button onclick="toggleAutoDJ()" id="auto-dj-btn">🤖 الدي جي الآلي</button>
                    <button onclick="startRecording()">🎙️ تسجيل</button>
                    <button onclick="stopRecording()">⏹️ إيقاف</button>
                    <div class="pads">
                        <button onclick="triggerSynthPad(150)">كيك</button>
                        <button onclick="triggerSynthPad(300)">سنير</button>
                        <button onclick="triggerSynthPad(600)">هاي هات</button>
                        <button onclick="triggerSynthPad(900)">سينث</button>
                    </div>
                </div>
                <div class="deck">
                    <h3>القرص ب</h3>
                    <input type="file" accept="audio/*" id="file-b" onchange="loadTrack(event,'b')">
                    <canvas id="viz-b" class="viz"></canvas>
                    <button onclick="togglePlay('b')">▶ تشغيل</button>
                    <input type="range" min="0" max="100" value="80" oninput="changeVolume('b',this.value/100)">
                    <div class="fx">
                        <label>الجهير</label><input type="range" min="-20" max="20" value="0" oninput="changeEQ('b','bass',this.value)">
                        <label>الوسط</label><input type="range" min="-20" max="20" value="0" oninput="changeEQ('b','mid',this.value)">
                        <label>الحاد</label><input type="range" min="-20" max="20" value="0" oninput="changeEQ('b','treble',this.value)">
                        <label>الصدى</label><input type="range" min="0" max="1" step="0.01" value="0" oninput="changeDelay('b',this.value)">
                        <label>التشويه</label><input type="range" min="0" max="100" value="0" oninput="changeDistortion('b',this.value)">
                        <button onclick="toggleReverb('b')">الصدى الثلاثي</button>
                        <button onclick="toggleFlanger('b')">الفلانجر</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- باقي الألواح كما هي مع نصوص عربية -->
        <div id="panel-live" class="panel"><h2>📡 البث المباشر</h2>
            <video id="local-video" autoplay muted></video><div id="remote-videos"></div>
            <button onclick="startBroadcast()">ابدأ البث</button><button onclick="stopBroadcast()">إيقاف</button>
        </div>
        <div id="panel-ai" class="panel"><h2>🧠 الذكاء الاصطناعي</h2>
            <button onclick="detectBPMRealtime()">كشف الإيقاع</button>
            <button onclick="separateStems()">فصل الطبقات</button>
            <button onclick="generateLyrics()">توليد كلمات</button>
            <textarea id="ai-output" rows="4" placeholder="النتائج هنا..."></textarea>
        </div>
        <div id="panel-blockchain" class="panel"><h2>⛓️ البلوكشين</h2>
            <button onclick="connectWallet()">ربط المحفظة</button><span id="wallet-address"></span>
            <div id="nft-gallery"></div>
        </div>
        <div id="panel-social" class="panel"><h2>💬 غرفة الدردشة</h2>
            <div id="chat-box"></div>
            <input id="chat-input" placeholder="رسالتك..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">أرسل</button>
            <button onclick="startVoiceChat()">🎤 محادثة صوتية</button>
        </div>
        <div id="panel-games" class="panel"><h2>🎮 ذراع التحكم</h2>
            <canvas id="game-canvas" width="400" height="300"></canvas>
            <p>حرك الذراع لتتحكم بالخلاط</p>
        </div>
        <div id="panel-files" class="panel"><h2>📁 تورنت</h2>
            <input type="file" id="torrent-file" onchange="seedTorrent(event)">
            <button onclick="downloadTorrent()">تحميل ملف</button>
            <div id="torrent-progress"></div>
        </div>
        <div id="panel-vr" class="panel"><h2>🥽 الواقع الافتراضي والمعزز</h2>
            <button onclick="enterVR()">دخول VR</button>
            <button onclick="openAR()">📱 فتح AR</button>
            <div id="ar-container" style="width:100%;height:400px;display:none;"></div>
        </div>
        <div id="panel-midi" class="panel"><h2>🎹 أجهزة MIDI</h2>
            <button onclick="initMIDI()">🔌 اتصال</button><p id="midi-status">غير متصل</p>
        </div>
        <div id="panel-storage" class="panel"><h2>💾 الأرشيف المحلي</h2>
            <button onclick="saveCurrentTrack()">💿 حفظ المسار</button>
            <button onclick="loadSavedTracks()">📂 تحميل المسارات</button>
            <div id="saved-tracks-list"></div>
        </div>
    </div>

    <!-- سكريبت التطبيق الأساسي (المحرك) -->
    <script src="app.js"></script>

    <!-- ========== السحر الإضافي (ثلاثي الأبعاد، PWA، MIDI، AR، DB) ========== -->
    <script>
        // ---------- تحسين الخلفية إلى مجرة حلزونية ثلاثية الأبعاد ----------
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-nuclear'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 15;

        // إنشاء مجرة من آلاف الجزيئات
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 2000;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            // توزيع حلزوني
            const radius = 5 + Math.random() * 10;
            const angle = Math.random() * Math.PI * 2;
            const height = (Math.random() - 0.5) * 8;
            starsPositions[i] = Math.cos(angle) * radius;
            starsPositions[i+1] = height;
            starsPositions[i+2] = Math.sin(angle) * radius;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.1 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // نواة لامعة
        const coreGeo = new THREE.SphereGeometry(1.2, 32, 32);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0xff00ff, wireframe: true });
        const core = new THREE.Mesh(coreGeo, coreMat);
        scene.add(core);

        // حلقة حول النواة
        const ringGeo = new THREE.TorusGeometry(2.5, 0.1, 16, 100);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffd700, wireframe: true });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        scene.add(ring);

        function animateGalaxy() {
            requestAnimationFrame(animateGalaxy);
            stars.rotation.y += 0.0002;
            core.rotation.x += 0.005;
            core.rotation.y += 0.01;
            ring.rotation.z += 0.005;
            renderer.render(scene, camera);
        }
        animateGalaxy();

        // ---------- PWA: Service Worker ديناميكي ----------
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'beto-nuclear-v2';
                const ASSETS = [
                    '/',
                    '/index.html',
                    '/app.js',
                    'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',
                    'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js',
                    'https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js',
                    'https://cdn.jsdelivr.net/npm/webtorrent@1.9.0/webtorrent.min.js'
                ];
                self.addEventListener('install', e => {
                    e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS)));
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        // ---------- MIDI (بالعربية) ----------
        async function initMIDI() {
            if (!navigator.requestMIDIAccess) return alert('متصفحك لا يدعم MIDI');
            const midi = await navigator.requestMIDIAccess();
            document.getElementById('midi-status').textContent = '✅ متصل';
            midi.inputs.forEach(input => {
                input.onmidimessage = (msg) => {
                    const [command, note, velocity] = msg.data;
                    if (command === 144 && velocity > 0) {
                        switch(note) {
                            case 36: togglePlay('a'); break;
                            case 37: togglePlay('b'); break;
                            case 38: crossfade(0); document.getElementById('crossfader').value = 0; break;
                            case 39: crossfade(1); document.getElementById('crossfader').value = 100; break;
                            case 40: toggleAutoDJ(); break;
                        }
                    }
                };
            });
        }

        // ---------- قاعدة البيانات (IndexedDB) ----------
        const dbPromise = indexedDB.open('BetoNukeDB', 1);
        dbPromise.onupgradeneeded = (e) => {
            e.target.result.createObjectStore('tracks', { keyPath: 'id', autoIncrement: true });
        };
        function saveCurrentTrack() {
            const fileInput = document.querySelector('input[type="file"]');
            if (!fileInput.files[0]) return alert('اختر ملفاً أولاً');
            const reader = new FileReader();
            reader.onload = () => {
                const open = indexedDB.open('BetoNukeDB');
                open.onsuccess = (e) => {
                    const db = e.target.result;
                    const tx = db.transaction('tracks', 'readwrite');
                    tx.objectStore('tracks').add({ blob: reader.result, name: fileInput.files[0].name, date: Date.now() });
                    alert('تم الحفظ');
                };
            };
            reader.readAsDataURL(fileInput.files[0]);
        }
        function loadSavedTracks() {
            const open = indexedDB.open('BetoNukeDB');
            open.onsuccess = (e) => {
                const db = e.target.result;
                const tx = db.transaction('tracks', 'readonly');
                const req = tx.objectStore('tracks').getAll();
                req.onsuccess = () => {
                    const listDiv = document.getElementById('saved-tracks-list');
                    listDiv.innerHTML = '';
                    req.result.forEach(t => {
                        const btn = document.createElement('button');
                        btn.textContent = t.name;
                        btn.onclick = () => {
                            const arr = t.blob.split(','), mime = arr[0].match(/:(.*?);/)[1];
                            const bstr = atob(arr[1]), n = bstr.length;
                            const u8arr = new Uint8Array(n);
                            for (let i = 0; i < n; i++) u8arr[i] = bstr.charCodeAt(i);
                            const blob = new Blob([u8arr], {type: mime});
                            const url = URL.createObjectURL(blob);
                            decks.a.audio.src = url;
                            detectBPM('a');
                        };
                        listDiv.appendChild(btn);
                    });
                };
            };
        }

        // ---------- AR / VR ----------
        function openAR() {
            const container = document.getElementById('ar-container');
            container.style.display = 'block';
            container.innerHTML = `<a-scene embedded arjs>
                <a-marker preset="hiro">
                    <a-entity geometry="primitive: box" material="color: red"></a-entity>
                </a-marker>
                <a-entity camera></a-entity>
            </a-scene>`;
        }
        function enterVR() {
            const container = document.getElementById('ar-container');
            container.style.display = 'block';
            container.innerHTML = `<a-scene>
                <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
                <a-sky color="#222"></a-sky>
            </a-scene>`;
        }

        // ---------- تأثير الانتقال البوابي بين الألواح ----------
        window.switchPanel = (id) => {
            const panels = document.querySelectorAll('.panel');
            panels.forEach(p => p.classList.remove('active'));
            const target = document.getElementById(`panel-${id}`);
            target.classList.add('active', 'portal-transition');
            setTimeout(() => target.classList.remove('portal-transition'), 500);
        };
    </script>
</body>
</html>
